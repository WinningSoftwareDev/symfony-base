image: php:8.4-cli

pipelines:
  pull-requests:
    '**':
      - step:
          name: "Verify GPG Signature"
          script:
            - apt-get update && apt-get install -y git gnupg
            - |
              echo "Verifying commit: $BITBUCKET_COMMIT"
              SIGNED_STATUS=(`git log -1 --pretty=format:%G?`)
              echo "Signed status: $SIGNED_STATUS"
              if [ "$SIGNED_STATUS" = "G" ] || [ "$SIGNED_STATUS" = "U" ]; then
                echo "Commit is GPG-signed ✅"
              else
                echo "Commit is NOT GPG-signed ❌"
                exit 1
              fi
      - step:
          name: "PHP 8.4: Code Standards"
          caches:
            - composer
          script:
            - apt-get update && apt-get install -y git zip unzip
            - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
            - composer install
            - composer run-script cs
            - composer run-script stan
      - step:
          name: "TypeScript: Linting"
          caches:
            - node
          script:
            - apt-get update && apt-get install -y curl
            - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            - apt-get install -y nodejs
            - npm install
            - npm run lint