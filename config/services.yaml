parameters:

imports:
  - { resource: '../vendor/cloudbase/latte-helper/config/services.yaml' }

services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: '../src/'

  App\Application\Command\DatabaseSetupCommand:
    arguments:
      $dbHost: '%env(DB_HOST)%'
      $dbPort: '%env(DB_PORT)%'
      $dbUser: '%env(DB_USER)%'
      $dbPassword: '%env(DB_PASSWORD)%'
    tags: [ 'console.command' ]

  App\_Core\Controller\:
    resource: '../src/_Core/Controller'
    tags: [ 'controller.service_arguments' ]
    calls:
      - setLatteFactory: ['@CloudBase\LatteHelper\Classes\Latte\LatteEngineFactory']

  App\Application\Controller\:
    resource: '../src/Application/Controller'
    tags: [ 'controller.service_arguments' ]
    calls:
      - setLatteFactory: ['@CloudBase\LatteHelper\Classes\Latte\LatteEngineFactory']

  App\Authentication\Controller\:
    resource: '../src/Authentication/Controller'
    tags: [ 'controller.service_arguments' ]
    calls:
      - setLatteFactory: ['@CloudBase\LatteHelper\Classes\Latte\LatteEngineFactory']
